name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-agent-runtime-contracts:
    name: Validate Agent Runtime Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validator dependencies
        run: python -m pip install --upgrade pip jsonschema
      - name: Validate schemas against fixtures
        run: python .github/scripts/validate_agent_runtime_contracts.py

  lint-and-test-frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage

  lint-and-test-backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [validate-agent-runtime-contracts, lint-and-test-frontend, lint-and-test-backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: docker compose build
